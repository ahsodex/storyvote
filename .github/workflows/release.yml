name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure Release Exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "StoryVote ${{ github.ref_name }}" \
            --notes "Self-hosted agile story point estimation server release.

          This release is built automatically for:
          - Linux x86_64
          - macOS x86_64
          - macOS aarch64
          - Windows x86_64

          Download the artifact for your platform and run the executable directly."

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: storyvote
            asset_name: storyvote-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: storyvote
            asset_name: storyvote-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: storyvote
            asset_name: storyvote-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: storyvote.exe
            asset_name: storyvote-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release/
          cd release
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -p release
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -Destination "release/"
          cd release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload Release Asset (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "./release/${{ matrix.asset_name }}.tar.gz" --repo "${{ github.repository }}" --clobber

      - name: Upload Release Asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "./release/${{ matrix.asset_name }}.zip" --repo "${{ github.repository }}" --clobber
